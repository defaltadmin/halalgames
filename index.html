const CONTENT_RULES={faithImpact:{label:'Faith Impact',terms:[{term:'witchcraft',sev:'caution'},{term:'necromancy',sev:'caution'},{term:'polytheism',sev:'caution'},{term:'sorcery',sev:'caution'},{term:'spells',sev:'caution'},{term:'magic',sev:'caution'},{term:'mythology',sev:'caution'},{term:/\bdemons?\b/,sev:'caution'},{term:/\bidol\b/,sev:'caution'}]},financialEthics:{label:'Financial Ethics',terms:[{term:'casino',sev:'haram'},{term:'gambling',sev:'haram'},{term:'betting',sev:'haram'},{term:'poker',sev:'haram'},{term:'slot machine',sev:'haram'},{term:'lootbox',sev:'caution'},{term:'gacha',sev:'caution'},{term:'microtransaction',sev:'caution'}]},modesty:{label:'Modesty',terms:[{term:'nudity',sev:'haram'},{term:'nude',sev:'haram'},{term:'sexual',sev:'haram'},{term:'erotic',sev:'haram'},{term:'nsfw',sev:'haram'},{term:'ecchi',sev:'haram'},{term:'suggestive',sev:'haram'},{term:'revealing',sev:'haram'},{term:'skimpy',sev:'haram'},{term:'risque',sev:'haram'},{term:'fanservice',sev:'haram'}]},violenceLevel:{label:'Violence',terms:[{term:/\bgore\b/,sev:'haram'},{term:/\bguts\b/,sev:'haram'},{term:'fatality',sev:'haram'},{term:'gory',sev:'haram'},{term:/\bblood\b/,sev:'caution'},{term:'violence',sev:'caution'},{term:'realistic',sev:'caution'}]}};
const GENERAL_CAUTION=['alcohol','drugs','dark-fantasy',/\bwar\b/];
const HALAL_KW=['puzzle','racing','sports','simulator','educational','clean','family','kids','platformer','strategy','building','crafting','farm','cooking','relaxing','creative','soccer','casual','party','deduction','co-op','sandbox'];
function lof(x){return x instanceof RegExp?x.source.replace(/\\b/g,''):x}
function screenGame(g){const t=[g.name,g.description_raw||'',...(g.genres||[]).map(x=>x.name),...(g.tags||[]).map(x=>x.name)].join(' ').toLowerCase(),esrb=(g.esrb_rating?.name||'').toLowerCase();let sc=70;const tags=[],fl={};for(const[k,rule]of Object.entries(CONTENT_RULES)){const hits=rule.terms.filter(({term})=>term instanceof RegExp?term.test(t):t.includes(term));for(const h of hits){tags.push(h.sev+':'+lof(h.term));sc+=h.sev==='haram'?-20:-8}fl[k]={status:hits.some(h=>h.sev==='haram')?'haram':hits.length?'caution':'safe',detail:hits.length?'Contains: '+hits.slice(0,3).map(h=>lof(h.term)).join(', '):'No '+rule.label.toLowerCase()+' concerns'}}for(const kw of GENERAL_CAUTION){if(kw instanceof RegExp?kw.test(t):t.includes(kw)){tags.push('caution:'+lof(kw));sc-=8}}for(const kw of HALAL_KW){if(t.includes(kw)){tags.push('halal:'+kw);sc+=4}}if(esrb.includes('mature')){sc-=25;tags.push('esrb:mature')}else if(esrb.includes('teen')){sc-=8;tags.push('esrb:teen')}else if(esrb.includes('everyone')){sc+=5;tags.push('esrb:everyone')}fl.audioContent={status:'info',detail:'Most games include music. Mute in settings if needed.'};sc=Math.max(0,Math.min(100,sc));let v='halal';if(sc<35)v='haram';else if(sc<65)v='caution';if(tags.some(x=>x.startsWith('haram:'))&&v!=='haram'){v='caution';sc=Math.min(sc,40)}return{verdict:v,score:sc,flags:fl,tags}}
function genTips(sr){const t=[];if(sr.flags.faithImpact.status!=='safe')t.push('Contains fantasy/dark magic. Remember this is fictional.');if(sr.flags.financialEthics.status!=='safe')t.push('Contains lootbox/gacha mechanics. Be cautious.');if(sr.flags.modesty.status!=='safe')t.push('Features sexualized content.');if(sr.flags.violenceLevel.status==='haram')t.push('Contains extreme violence.');else if(sr.flags.violenceLevel.status==='caution')t.push('Contains moderate violence.');if(!t.length)t.push('This game appears free of major concerns. Enjoy!');return t}

let _rgid=null;function openReport(gid,gn){_rgid=gid;document.getElementById('report-game-name').textContent='Reporting: '+gn;document.getElementById('report-reason').value='';document.getElementById('report-modal').classList.add('open')}function closeReportModal(){document.getElementById('report-modal').classList.remove('open')}async function submitReport(){const r=document.getElementById('report-reason').value.trim();if(!r){showToast('Enter a reason');return}try{const res=await fetch('/api/reports',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({gameId:_rgid,reason:r})});if(!res.ok)throw new Error('submit failed');closeReportModal();showToast('Report submitted!')}catch(e){showToast('Report saved locally');const rp=JSON.parse(localStorage.getItem('hg_reports')||'[]');rp.push({id:crypto.randomUUID(),gameId:_rgid,reason:r,ts:Date.now()});localStorage.setItem('hg_reports',JSON.stringify(rp));closeReportModal()}}
let _adminPw='';async function openAdmin(){const pw=prompt('Admin password:');if(!pw)return;try{const res=await fetch('/api/admin-check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});if(res.status!==200){showToast('Invalid password');return}_adminPw=pw;const rpRes=await fetch('/api/reports',{headers:{'X-Admin-Password':pw}});const rp=rpRes.ok?await rpRes.json():[];const el=document.getElementById('admin-reports');if(!rp.length){el.innerHTML='<p style="color:var(--muted)">No reports yet.</p>';document.getElementById('admin-modal')?.classList.add('open');return}el.innerHTML=rp.map(r=>{const g=MOCK_GAMES.find(x=>x.id===r.gameId);return'<div style="padding:.75rem;border-bottom:1px solid var(--border)"><div style="color:var(--heading);font-weight:600">'+esc(g?g.name:'ID:'+r.gameId)+'</div><div style="color:var(--muted);font-size:.8125rem">'+esc(r.reason)+'</div><button onclick="dismissReport(\''+r.id+'\')" style="margin-top:4px;padding:4px 8px;border-radius:6px;background:rgba(92,190,136,.15);color:var(--halal);border:none;cursor:pointer;font-size:.75rem">Dismiss</button></div>'}).join('');document.getElementById('admin-modal')?.classList.add('open')}catch(e){showToast('Auth failed')}}
async function dismissReport(id){try{await fetch('/api/reports?id='+id,{method:'DELETE',headers:{'X-Admin-Password':_adminPw}});openAdmin()}catch(e){showToast('Dismiss failed')}}

/* ===== MENU DRAWER ===== */
function toggleMenu(){const d=document.getElementById('menu-drawer'),o=document.getElementById('menu-overlay'),b=document.getElementById('menu-btn');const open=!d.classList.contains('open');d.classList.toggle('open',open);o.classList.toggle('open',open);b.setAttribute('aria-expanded',String(open));document.body.style.overflow=open?'hidden':''}
const INFO_PANELS={about:{title:'About HalalGames Guide',body:'<p><strong>What We Check</strong></p><p>Every game is screened across five categories: Faith Impact (shirk, magic, polytheism), Financial Ethics (gambling, lootboxes), Modesty (nudity, sexual content), Violence Level, and Audio Content.</p><p><strong>How It Works</strong></p><p>Search any game title. Our engine analyzes genres, descriptions, and tags against an Islamic content matrix. You can vote on verdicts and report errors.</p><p><strong>Disclaimer</strong></p><p>This is a community tool for informational purposes only. It does not constitute a religious ruling (fatwa). Islamic scholars may differ on specific games. Always consult qualified scholars for personal religious guidance.</p>'},resources:{title:'Islamic Gaming Resources',body:'<p><a href="https://islamqa.info/en/answers/22305" target="_blank" rel="noopener" style="color:var(--brand)">IslamQA</a>. Scholarly ruling on video games and permissible entertainment.</p><p><a href="https://www.islamweb.org/en/fatawa/222" target="_blank" rel="noopener" style="color:var(--brand)">IslamWeb</a>. Rulings on gambling, betting, and games of chance.</p><p><a href="https://halalguidelines.com/haram-games-in-islam/" target="_blank" rel="noopener" style="color:var(--brand)">Halal Guidelines</a>. Detailed breakdown of why specific games are haram.</p>'},privacy:{title:'Privacy Policy',body:'<p>HalalGames Guide does not use accounts, analytics, or tracking scripts.</p><p>Searches are sent through our own server to RAWG game database. RAWG never sees your IP or browser directly.</p><p>Reports and votes you submit are stored to review flagged verdicts. They include the game and your message, not your identity.</p>'},terms:{title:'Terms of Service',body:'<p>HalalGames Guide is an informational tool. Verdicts are generated automatically and reviewed informally by the community. They are not a religious ruling.</p><p>We make no guarantee that any verdict is complete or error-free. Use your own judgment and consult a qualified scholar for religious guidance.</p>'},cookies:{title:'Cookie Policy',body:'<p>This site does not set cookies.</p>'}};
function openInfoModal(key){const p=INFO_PANELS[key];if(!p)return;document.getElementById('info-title').textContent=p.title;document.getElementById('info-body').innerHTML=p.body;document.getElementById('info-modal').classList.add('open');toggleMenu()}
function closeInfoModal(){document.getElementById('info-modal').classList.remove('open')}

/* ===== STATE ===== */
let CG=[],CF='all',CS='relevance',CGn='',DT=null,AC=null,UF=false,VM='grid',genresExpanded=false;
const SC=new Map(),CM=50;
function cacheGet(k){if(!SC.has(k))return;const v=SC.get(k);SC.delete(k);SC.set(k,v);return v}
function cacheSet(k,v){SC.delete(k);SC.set(k,v);if(SC.size>CM)SC.delete(SC.keys().next().value)}
const $si=document.getElementById('search-input'),$res=document.getElementById('results'),$es=document.getElementById('empty-state'),$sk=document.getElementById('skeletons'),$rc=document.getElementById('result-count'),$ss=document.getElementById('sort-select'),$gm=document.getElementById('detail-modal'),$gmc=document.getElementById('detail-content'),$ld=document.getElementById('loader');

/* ===== VERDICT TABS ===== */
function renderVerdictTabs(){const counts={all:CG.length,halal:0,caution:0,haram:0};CG.forEach(g=>counts[g.screen.verdict]++);const tabs=[['all','All'],['halal','Halal'],['caution','Caution'],['haram','Avoid']].filter(([k])=>k==='all'||counts[k]>0);document.getElementById('verdict-tabs').innerHTML=tabs.map(([k,l])=>'<button class="verdict-tab'+(CF===k?' active':'')+'" role="tab" aria-selected="'+(CF===k)+'" onclick="setVerdictFilter(\''+k+'\')">'+l+' ('+counts[k]+')</button>').join('')}
function setVerdictFilter(k){CF=k;renderVerdictTabs();applyFilters()}

/* ===== GENRE CHIPS ===== */
const PRIMARY_GENRES=['Action','RPG','Strategy','Sports','Puzzle'];
function renderGenreChips(){const all=[...new Set(CG.flatMap(g=>(g.genres||[]).map(x=>x.name)))].sort();const shown=genresExpanded?all:all.filter(g=>PRIMARY_GENRES.includes(g));const rem=all.length-shown.length;let h='<button class="chip'+(CGn===''?' active':'')+'" onclick="setGenreFilter(\'\')">All Genres</button>';h+=shown.map(g=>'<button class="chip'+(CGn===g?' active':'')+'" onclick="setGenreFilter(\''+g+'\')">'+g+'</button>').join('');if(!genresExpanded&&rem>0)h+='<button class="chip chip-more" onclick="expandGenres()">+'+rem+'</button>';document.getElementById('genre-row').innerHTML=h}
function expandGenres(){genresExpanded=true;renderGenreChips()}
function setGenreFilter(g){CGn=g;applyFilters()}

/* ===== VIEW MODE ===== */
function setViewMode(m){VM=m;document.getElementById('view-grid-btn').classList.toggle('active',m==='grid');document.getElementById('view-list-btn').classList.toggle('active',m==='list');$res.classList.toggle('list-mode',m==='list');renderResults(CG)}

/* ===== STORE LINKS (always show something) ===== */
function getStoreLinks(g){const n=encodeURIComponent(g.name),l=[],s=g.stores||[];for(const x of s){const id=x.store?.id||0,sn=(x.store?.name||'').toLowerCase();if(id===1||sn.includes('steam')||sn.includes('epic'))l.push({label:'Steam',url:'https://store.steampowered.com/search/?term='+n,cls:'steam'});if(id===2||sn.includes('playstation'))l.push({label:'PlayStation',url:'https://store.playstation.com/search/'+n,cls:'ps'});if(id===3||sn.includes('xbox'))l.push({label:'Xbox',url:'https://www.xbox.com/en-us/search?q='+n,cls:'xbox'});if(id===7||sn.includes('nintendo'))l.push({label:'Nintendo',url:'https://www.nintendo.com/us/search/?q='+n,cls:'nintendo'})}if(!l.length)l.push({label:'Search',url:'https://www.google.com/search?q='+encodeURIComponent(g.name+' buy'),cls:'google'});return l}

/* ===== API FETCH ===== */
async function fetchGames(q){const ck=q.trim().toLowerCase(),cached=cacheGet(ck);if(cached){UF=false;return cached}AC?.abort();AC=new AbortController();const{signal}=AC;try{const res=await fetch(CONFIG.API_BASE+'?search='+encodeURIComponent(q)+'&page_size=20',{signal});if(!res.ok)throw new Error('proxy '+res.status);const data=await res.json();const games=(data.results||[]).map(g=>({...g,description_raw:g.description_raw||g.description||'',esrb_rating:g.esrb_rating||{name:g.rating_top<=2?'Everyone':'Teen'},stores:g.stores||[]}));
cacheSet(ck,games);UF=false;return games}catch(err){if(err.name==='AbortError')return null;UF=true;return MOCK_GAMES.filter(g=>g.name.toLowerCase().includes(ck)||(g.description_raw||'').toLowerCase().includes(ck)||(g.genres||[]).some(x=>x.name.toLowerCase().includes(ck))||(g.tags||[]).some(x=>x.name.toLowerCase().includes(ck)))}}

/* ===== RENDER ===== */
function screenAll(g){return g.map(x=>({...x,screen:screenGame(x)}))}
function applyFilters(){let g=CG;if(CF!=='all')g=g.filter(x=>x.screen.verdict===CF);if(CGn)g=g.filter(x=>(x.genres||[]).some(gen=>gen.name===CGn));rF(g)}
function gFS(games){let f=games;if(CF!=='all')f=f.filter(x=>x.screen.verdict===CF);if(CGn)f=f.filter(x=>(x.genres||[]).some(gen=>gen.name===CGn));if(CS==='score')f.sort((a,b)=>b.screen.score-a.screen.score);else if(CS==='name')f.sort((a,b)=>a.name.localeCompare(b.name));return f}
function rF(games){$rc.textContent=games.length+' game'+(games.length!==1?'s':'')+' found'+(UF?' (offline)':'');if(!games.length){$res.innerHTML='';$es.style.display='block'}else{$es.style.display='none';$res.innerHTML=games.map(rC).join('')}}
function rC(g){
  const s=g.screen,v='verdict-'+s.verdict,vl=s.verdict==='halal'?'Halal':s.verdict==='caution'?'Caution':'Avoid',sc=s.verdict==='halal'?'var(--halal)':s.verdict==='caution'?'var(--caution)':'var(--haram)',img=g.background_image?g.background_image:placeholderImage(g.name,460,215),year=g.released?g.released.split('-')[0]:'';const gn=esc((g.genres||[]).map(x=>x.name).join(', ')),sn=esc(g.name),pl=(g.platforms||[]).join(' · ');
  if(VM==='list'){return'<article class="game-card game-card-list" data-game-id="'+g.id+'" tabindex="0" role="button" aria-label="View '+sn+'"><img src="'+esc(img)+'" alt="" loading="lazy" style="width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0"><div style="flex:1;min-width:0"><div style="color:var(--heading);font-weight:600;font-size:.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+sn+'</div><div style="color:var(--muted);font-size:.75rem">'+gn+'</div></div><span class="verdict-badge '+v+'" style="flex-shrink:0">'+vl+'</span><span style="color:'+sc+';font-size:.75rem;font-weight:600;flex-shrink:0">'+s.score+'</span></article>'}
  return'<article class="game-card" data-game-id="'+g.id+'" tabindex="0" role="button" aria-label="View '+sn+'"><div class="card-image"><img src="'+esc(img)+'" alt="'+sn+'" loading="lazy"></div><div style="padding:.625rem"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px"><span class="verdict-badge '+v+'">'+vl+'</span><span style="color:var(--muted);font-size:.625rem">'+year+'</span></div><h3 style="color:var(--heading);font-size:.8125rem;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+sn+'</h3><p style="color:var(--muted);font-size:.6875rem;margin-bottom:4px">'+gn+'</p>'+(pl?'<p style="color:var(--muted);font-size:.625rem;margin-bottom:6px">'+pl+'</p>':'')+'<div style="display:flex;align-items:center;gap:4px"><div class="score-bar" style="flex:1"><div class="score-fill" style="width:'+s.score+'%;background:'+sc+'"></div></div><span style="color:'+sc+';font-size:.625rem;font-weight:600">'+s.score+'/100</span></div></div></article>'}
function renderResults(games){CG=screenAll(games);renderVerdictTabs();renderGenreChips();rF(gFS(CG))}
function showSkel(){$sk.style.display='grid';$sk.style.gridTemplateColumns='repeat(auto-fill,minmax(240px,1fr))';$sk.style.gap='.75rem';$sk.innerHTML=Array(6).fill('<div style="background:rgba(24,39,34,.8);border:1px solid var(--border);border-radius:14px;overflow:hidden"><div class="skeleton" style="height:110px"></div><div style="padding:.625rem"><div class="skeleton" style="height:14px;width:40%;margin-bottom:6px"></div><div class="skeleton" style="height:12px;width:70%"></div></div></div>').join('');$res.innerHTML='';$es.style.display='none'}
function hideSkel(){$sk.style.display='none';$sk.innerHTML=''}
async function handleSearch(){const q=$si.value.trim();if(!q){UF=false;renderResults(MOCK_GAMES);return}showSkel();const g=await fetchGames(q);if(g===null)return;hideSkel();renderResults(g)}
$si.addEventListener('input',()=>{clearTimeout(DT);DT=setTimeout(handleSearch,300)});
$si.addEventListener('keydown',e=>{if(e.key==='Escape'){$si.value='';handleSearch()}if(e.key==='Enter'){clearTimeout(DT);handleSearch()}});
$ss.addEventListener('change',()=>{CS=$ss.value;if(CG.length)applyFilters()});

/* ===== MODAL ===== */
let lfe=null;function trapF(e){if(e.key!=='Tab')return;const f=$gmc.querySelectorAll('button,[href],input,[tabindex]:not([tabindex="-1"])');if(!f.length)return;const a=f[0],b=f[f.length-1];if(e.shiftKey&&document.activeElement===a){e.preventDefault();b.focus()}else if(!e.shiftKey&&document.activeElement===b){e.preventDefault();a.focus()}}
function ic(s){if(s==='safe')return'<div class="breakdown-icon icon-safe">\u2713</div>';if(s==='caution')return'<div class="breakdown-icon icon-caution">!</div>';if(s==='info')return'<div class="breakdown-icon icon-safe">\u266A</div>';return'<div class="breakdown-icon icon-haram">\u2717</div>'}
function openDetail(gid){const g=MOCK_GAMES.find(x=>x.id===gid)||CG.find(x=>x.id===gid);if(!g)return;const s=g.screen||screenGame(g),tips=genTips(s),vl=s.verdict==='halal'?'Halal':s.verdict==='caution'?'Caution':'Avoid',sc=s.verdict==='halal'?'var(--halal)':s.verdict==='caution'?'var(--caution)':'var(--haram)',img=placeholderImage(g.name,640,360),year=g.released?g.released.split('-')[0]:'';const gn=esc((g.genres||[]).map(x=>x.name).join(', ')),esrb=esc(g.esrb_rating?.name||'NR'),sn=esc(g.name),sd=esc(g.description_raw||'No description.'),sl=getStoreLinks(g);$gmc.innerHTML='<button class="modal-close" onclick="closeModal()">&#10005;</button><div style="aspect-ratio:16/9;border-radius:12px;overflow:hidden;margin-bottom:1rem;background:var(--bg)"><img src="'+esc(img)+'" alt="'+sn+'" style="width:100%;height:100%;object-fit:cover"></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:8px"><h2 id="detail-title" style="color:var(--heading);font-size:1.5rem;font-weight:700">'+sn+'</h2><span style="color:var(--muted);font-size:.875rem">'+year+'</span></div><p style="color:var(--muted);font-size:.8125rem;margin-bottom:.75rem">'+gn+' &middot; ESRB: '+esrb+'</p><div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem"><span class="verdict-badge verdict-'+s.verdict+'" style="font-size:.9375rem;padding:6px 16px">'+vl+'</span><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:.75rem;color:var(--muted)">Halal Score</span><span style="font-size:.8125rem;font-weight:600;color:'+sc+'">'+s.score+'/100</span></div><div class="score-bar" style="height:8px"><div class="score-fill" style="width:'+s.score+'%;background:'+sc+'"></div></div></div></div><p style="color:var(--text);font-size:.9375rem;line-height:1.6;margin-bottom:1rem">'+sd+'</p><h3 style="color:var(--heading);font-size:1rem;font-weight:600;margin-bottom:.75rem">Content Breakdown</h3><div style="margin-bottom:1rem"><div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(37,54,47,.4)">'+ic(s.flags.faithImpact.status)+'<div style="flex:1"><div style="color:var(--heading);font-size:.875rem;font-weight:500">Faith Impact</div><div style="color:var(--muted);font-size:.8125rem">'+esc(s.flags.faithImpact.detail)+'</div></div></div><div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(37,54,47,.4)">'+ic(s.flags.financialEthics.status)+'<div style="flex:1"><div style="color:var(--heading);font-size:.875rem;font-weight:500">Financial Ethics</div><div style="color:var(--muted);font-size:.8125rem">'+esc(s.flags.financialEthics.detail)+'</div></div></div><div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(37,54,47,.4)">'+ic(s.flags.modesty.status)+'<div style="flex:1"><div style="color:var(--heading);font-size:.875rem;font-weight:500">Modesty</div><div style="color:var(--muted);font-size:.8125rem">'+esc(s.flags.modesty.detail)+'</div></div></div><div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(37,54,47,.4)">'+ic(s.flags.violenceLevel.status)+'<div style="flex:1"><div style="color:var(--heading);font-size:.875rem;font-weight:500">Violence</div><div style="color:var(--muted);font-size:.8125rem">'+esc(s.flags.violenceLevel.detail)+'</div></div></div><div style="display:flex;gap:10px;padding:8px 0">'+ic(s.flags.audioContent.status)+'<div style="flex:1"><div style="color:var(--heading);font-size:.875rem;font-weight:500">Audio</div><div style="color:var(--muted);font-size:.8125rem">'+esc(s.flags.audioContent.detail)+'</div></div></div></div><h3 style="color:var(--heading);font-size:1rem;font-weight:600;margin-bottom:.5rem">How to Play Safely</h3><div class="tip-box" style="margin-bottom:1rem">'+tips.map(t=>'<p style="color:var(--text);font-size:.875rem;line-height:1.6;margin-bottom:.25rem">\uD83D\uDCA1 '+esc(t)+'</p>').join('')+'</div><h3 style="color:var(--heading);font-size:1rem;font-weight:600;margin-bottom:.5rem">Where to Buy</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-bottom:1rem">'+sl.map(l=>'<a href="'+l.url+'" target="_blank" rel="noopener sponsored" style="display:flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:8px;font-size:.75rem;font-weight:500;text-decoration:none;background:'+(l.cls==='steam'?'#1b2838;color:#c7d5e0;border:1px solid #2a475e':l.cls==='ps'?'#003087;color:#fff':l.cls==='xbox'?'#107c10;color:#fff':l.cls==='nintendo'?'#e60012;color:#fff':l.cls==='google'?'#4285f4;color:#fff':'#FF9900;color:#000')+'">'+l.label+'</a>').join('')+'</div>'+(s.tags.length?'<details style="margin-top:.5rem"><summary style="color:var(--muted);font-size:.8125rem;cursor:pointer;padding:4px 0">Tags ('+s.tags.length+')</summary><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">'+s.tags.map(t=>'<span style="background:var(--border);color:var(--muted);padding:2px 8px;border-radius:4px;font-size:.6875rem">'+esc(t)+'</span>').join('')+'</div></details>':'');lfe=document.activeElement;$gm.classList.add('open');document.body.style.overflow='hidden';$gmc.querySelector('.modal-close')?.focus();document.addEventListener('keydown',trapF)}
function closeModal(){$gm.classList.remove('open');document.body.style.overflow='';document.removeEventListener('keydown',trapF);lfe?.focus()}
$gm.addEventListener('click',e=>{if(e.target===$gm)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&$gm.classList.contains('open'))closeModal()});
$res.addEventListener('click',e=>{const c=e.target.closest('.game-card');if(c)openDetail(Number(c.dataset.gameId))});
$res.addEventListener('keydown',e=>{if(e.key!=='Enter'&&e.key!==' ')return;const c=e.target.closest('.game-card');if(c){e.preventDefault();openDetail(Number(c.dataset.gameId))}});

window.addEventListener('DOMContentLoaded',()=>{renderResults(MOCK_GAMES);setTimeout(()=>$ld.classList.add('hide'),400);if(new URLSearchParams(location.search).has('admin'))openAdmin()});
