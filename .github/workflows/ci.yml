name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate games.json
        run: npm run test:catalog

      - name: Validate HTML
        run: npm run test:html || true

      - name: Build Tailwind
        run: npm run build:css

  smoke-test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test live site
        run: |
          echo "=== Smoke test: halalgames.mscarabia.com ==="

          # / — must return 200 and contain app.7035cc8.js reference
          status=$(curl -fsS -o /dev/null -w '%{http_code}' https://halalgames.mscarabia.com/)
          [ "$status" = "200" ] || { echo "FAIL: / returned $status"; exit 1; }
          curl -fsS https://halalgames.mscarabia.com/ | grep -q "app.7035cc8.js" || { echo "FAIL: / missing app.js ref"; exit 1; }

          # /games.json — must return valid JSON array with 30+ games
          games=$(curl -fsS https://halalgames.mscarabia.com/games.json)
          echo "$games" | node -e "const g=JSON.parse(require('fs').readFileSync(0,'utf8'));if(!Array.isArray(g)||g.length<10)throw new Error('games.json has '+g.length+' games');console.log('games.json: '+g.length+' games')"

          # /assets/app.7035cc8.js — must contain esc function
          curl -fsS https://halalgames.mscarabia.com/assets/app.7035cc8.js | grep -q "function esc" || { echo "FAIL: app.js missing esc()"; exit 1; }

          # /api/catalog — must return JSON with source
          catalog=$(curl -fsS https://halalgames.mscarabia.com/api/catalog)
          echo "$catalog" | node -e "const c=JSON.parse(require('fs').readFileSync(0,'utf8'));if(!c.source)throw new Error('catalog missing source');console.log('catalog: source='+c.source+', games='+c.games.length)"

          # Steam private profile error path — must return error, not crash
          steam_err=$(curl -fsS -o /dev/null -w '%{http_code}' "https://halalgames.mscarabia.com/api/steam-library?profile=https://steamcommunity.com/id/nonexistent123456789")
          [ "$steam_err" = "404" ] || [ "$steam_err" = "422" ] || [ "$steam_err" = "503" ] || { echo "FAIL: Steam error path returned $steam_err"; exit 1; }
          echo "Steam private/missing profile returns $steam_err (expected 404/422/503)"

          echo "=== All smoke tests passed ==="
