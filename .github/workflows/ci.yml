name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate HTML
        run: npx html-validate index.html

      - name: Build Tailwind
        run: npm install && npm run build:css

      - name: Serve site
        run: npx serve . -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080

      - name: Lighthouse CI
        run: |
          npm i -g @lhci/cli
          lhci autorun \
            --collect.url=http://localhost:8080 \
            --collect.numberOfRuns=1 \
            --assert.assertions.categories:accessibility="error:minScore=0.9" \
            --assert.assertions.categories:best-practices="error:minScore=0.9" \
            --assert.assertions.categories:seo="error:minScore=0.9"
