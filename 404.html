<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | HalalGames Guide</title>
  <style>
    :root { --bg: #06070b; --surface: #0c1018; --text: #c8d6e5; --heading: #f0f4f8; --brand: #818cf8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .container { padding: 2rem; }
    h1 { font-size: 6rem; color: var(--brand); line-height: 1; }
    h2 { color: var(--heading); margin: 1rem 0; }
    p { margin: 0.5rem 0; }
    a { color: var(--brand); text-decoration: none; border-bottom: 1px solid var(--brand); }
    a:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for does not exist.</p>
    <p style="margin-top: 1.5rem;"><a href="/">Back to HalalGames Guide</a></p>
  </div>
</body>
</html>
